document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\b(because|evidence|source|sourced|feats?|technically|the reason|consider|if you|actually|registry|on camera|account for)\\b/.test(t)) up+=ri(40,160);\n    if(/\\b(lmao|lmfao|lol|bruh|bro|deadass|ngl|fr|bestie|crying|sobbing|sir|the way|not the)\\b/.test(t)) up+=ri(50,200);\n    let spicy=false;\n    if(/\\b(mid|cope|seethe|ratio|trash|fraud|overrated|underrated|fight me|hot take|unpopular|solos?|negs?|stomps?|diff|fodder|washed)\\b/.test(t)) spicy=true;\n    if(len>14 && text===text.toUpperCase()) spicy=true;\n    if(spicy){ down+=ri(60,300); up+=ri(30,150); }\n    if(/\\b(idiot|dumb|clueless|skill issue|cope harder|shut up|you\\'?re? wrong|stupid take|ratio\\'?d)\\b/.test(t)) down+=ri(70,240);\n    if(/\\b(kill|murder|assassin|hired|bounty|contract)\\b/.test(t)) { down+=ri(20,90); up+=ri(20,90); }\n    return { up:Math.max(1,up), down:Math.max(0,down) };\n  }\n  animatePlayerVotes(id, tUp, tDown){\n    const run=(this._voteRun=(this._voteRun||0)+1);\n    const steps=4; let s=0;\n    const tick=()=>{\n      if(this._voteRun!==run) return;\n      s++; const f=s/steps;\n      this.updateNodeVotes(id, Math.max(1,Math.round(tUp*f)), Math.round(tDown*f));\n      if(s<steps){ this._voteT2=setTimeout(tick, 650+Math.random()*750); }\n    };\n    this._voteT2=setTimeout(tick, 800);\n  }\n  updateNodeVotes(nodeId, up, down){\n    const adds=this.state.forumOverlay.adds||{}; const next={}; let changed=false;\n    for(const k in adds){ next[k]=(adds[k]||[]).map(n=>{ if(n.id===nodeId){ changed=true; return Object.assign({},n,{up:up,down:down}); } return n; }); }\n    if(!changed) return;\n    this.setState({forumOverlay:{votes:this.state.forumOverlay.votes, adds:next, threads:this.state.forumOverlay.threads}}, ()=>this.persistForum());\n  }\n  // ---- staggered, no typing bubble: replies pop in underneath ----\n  // Primary engine: real Claude (window.claude.complete) reads the FULL post +\n  // the comment being replied to + the player's handle + canon, and writes in-character.\n  // Local heuristic engine is the instant fallback (offline / rate-limited / export).\n  async dispatchReplies(thread, rt, playerText, handle, npcParent, npcDepth){\n    const run=(this._npcRun=(this._npcRun||0)+1);\n    let replies=null;\n    if(window.claude && window.claude.complete){\n      try{\n        const raw=await Promise.race([\n          window.claude.complete({ messages:[{ role:'user', content:this.buildReplyPrompt(thread, rt, playerText, handle) }] }),\n          new Promise(r=>setTimeout(()=>r(null), 24000))\n        ]);\n        replies=this.parseReplies(raw, handle);\n      }catch(e){ replies=null; }\n    }\n    if(this._npcRun!==run){ return; } // a newer post superseded this one\n    if(!replies || !replies.length){ replies=this.generateLocalReplies(thread, rt, playerText, handle); }\n    replies=replies.slice(0,6);\n    let i=0;\n    const pushOne=()=>{\n      if(this._npcRun!==run || this.state.route.section!=='forum' || this.state.route.id!==thread.id){ this.setState({posting:false}); return; }\n      if(i>=replies.length){ this.setState({posting:false}); return; }\n      const r=replies[i++];\n      this.addComment(npcParent, { id:this.genId(thread.id), author:r.author, persona:r.persona, text:String(r.text||'').slice(0,500), up:r.up, down:r.down, ts:Date.now() });\n      this._npcT=setTimeout(pushOne, 650+Math.random()*1450);\n    };\n    this._npcT=setTimeout(pushOne, 350);\n  }\n  // resolve the exact comment the player replied to, for context\n  findParentContext(thread, rt){\n    if(!rt || rt.refId==='__op__'){ return { author:thread.author, text:((thread.body||'')+' '+(thread.op||[]).join(' ')).trim().slice(0,600), isOp:true }; }\n    const target=rt.refId; let found=null;\n    const walk=(arr,pid)=>{ (arr||[]).forEach((c,i)=>{ const id=pid+'#'+i; if(id===target&&!found) found={author:c.author,text:c.text||''}; walk(c.replies||[],id); }); };\n    walk(thread.comments, thread.id+':op');\n    if(!found){ const adds=this.state.forumOverlay.adds||{}; for(const k in adds){ (adds[k]||[]).forEach(n=>{ if(n.id===target&&!found) found={author:n.author,text:n.text||''}; }); } }\n    return found ? { author:found.author, text:String(found.text).slice(0,400), isOp:false } : { author:rt.author||thread.author, text:'', isOp:false };\n  }\n  registryDigest(){\n    if(this._regDigest) return this._regDigest;\n    let s=''; try{ const C=this.state.data.CHARACTERS; if(C){ s=Object.keys(C).slice(0,22).map(k=>{ const c=C[k]; return (c.sort||c.name)+(c.grade?' ['+c.grade+']':'')+(c.role?' \\u2013 '+c.role:''); }).filter(Boolean).join('; '); } }catch(e){}\n    this._regDigest=s; return s;\n  }\n  buildReplyPrompt(thread, rt, playerText, handle){\n    const parent=this.findParentContext(thread, rt);\n    const canon=[\n      'CANON FACTS (treat as ground truth; characters speculate like fans but never contradict these):',\n      'The \"Generation of Miracles\" are six prodigies. Mira Fushiguro = THE strongest; wields Six Eyes + Limitless with huge reserves, BUT her Eyes still OVERLOAD inside high cursed-energy zones (her one real weakness). Koyara Zen\\u2019in = Ten Shadows user; interim Zen\\u2019in clan head (holds it via Megumi\\u2019s will until Mira turns 18); landed a Blackest Flash on camera. Morikawa Raiya = highest raw cursed-energy output of the gen + a working Domain. Harunobu Kamado = Yuta Okkotsu\\u2019s only student, a blade master. Touya Okkotsu = the \"shadow sixth man\"; chained three Black Flashes against his own mother. The sixth seat of the gen was left EMPTY on purpose.',\n      'Ryomen Sora = a WANTED cursed vessel grown in Sukuna\\u2019s ORIGINAL body; split identities Roxas / Sukora; caused the Sanzaki Beach disaster (873 dead). Naoya Zen\\u2019in died right after losing the headship to Koyara (widely rumoured murder). EARTHQUAKE ARC is LIVE: Hiroto, the Earth Disaster Curse. Aqua Yumehara = a newly awakened magnetic ability. Yuta Okkotsu = Copy + Rika. Maki Zen\\u2019in = Heavenly Restriction e:pset[p]?P.bleed:'rgba(120,160,155,0.22)', bg:pset[p]?P.bleed+'1e':'transparent', fg:pset[p]?'#eafffb':'#84a39c' }));\n      const nums=(M.listings||[]).filter(l=>typeof l.cc==='number'&&l.cc>0).map(l=>l.cc);\n      const minCC=nums.length?Math.min.apply(null,nums):1;\n      const maxCC=nums.length?Math.max.apply(null,nums):1;\n      const lmin=Math.log10(minCC), lmax=Math.log10(maxCC);\n      const pctToCC=(p)=> (lmax<=lmin)? minCC : Math.round(Math.pow(10, lmin+(lmax-lmin)*(p/100)));\n      const minPct=this.state.marketMinPct, maxPct=this.state.marketMaxPct;\n      const selMin=pctToCC(minPct), selMax=pctToCC(maxPct);\n      vm.marketMinPct=minPct; vm.marketMaxPct=maxPct;\n      vm.setMarketMin=(e)=>this.setMarketMin(e); vm.setMarketMax=(e)=>this.setMarketMax(e);\n      vm.marketMinLabel=this.fmtMoney(selMin,cur); vm.marketMaxLabel=this.fmtMoney(selMax,cur);\n      const sort=this.state.marketSort||'asc';\n      vm.marketSortAsc=sort==='asc';\n      vm.marketSortAscGo=()=>this.setMarketSort('asc'); vm.marketSortDescGo=()=>this.setMarketSort('desc');\n      vm.marketSortAscEdge=sort==='asc'?P.bleed:'rgba(120,160,155,0.25)'; vm.marketSortAscBg=sort==='asc'?P.bleed+'1e':'transparent'; vm.marketSortAscFg=sort==='asc'?'#eafffb':'#7a958f';\n      vm.marketSortDescEdge=sort==='desc'?P.bleed:'rgba(120,160,155,0.25)'; vm.marketSortDescBg=sort==='desc'?P.bleed+'1e':'transparent'; vm.marketSortDescFg=sort==='desc'?'#eafffb':'#7a958f';\n      vm.resetMarket=()=>this.resetMarketFilters();\n      let items=(M.listings||[]).filter(l=>{\n        if(cat!=='ALL' && l.cat!==cat) return false;\n        if(Object.keys(tset).length && !tset[l.type]) return false;\n        if(Object.keys(pset).length && !pset[l.pay]) return false;\n        if(typeof l.cc==='number'){ if(l.cc<selMin||l.cc>selMax) return false; }\n        return true;\n      });\n      items=items.slice().sort((a,b)=>{\n        const av=(typeof a.cc==='number')?a.cc:null, bv=(typeof b.cc==='number')?b.cc:null;\n        if(av===null&&bv===null) return 0;\n        if(av===null) return 1; if(bv===null) return -1;\n        return sort==='asc'?(av-bv):(bv-av);\n      });\n      vm.marketCount=items.length; vm.marketEmpty=items.length===0;\n      vm.marketItems=items.map(l=>{ const p=this.pal(l.palette); const risky=/SEIZE|RISK|SWEEP|UNVERIFIED|NO RESERVE|SEALED|BURN|VAULTED|CONTRABAND|SMUGGLED|MOTIVATED/i.test((l.status||'')+' '+(l.type||''));\n        const isMast=l.cat==='MASTERPIECES';\n        return { id:l.id, name:l.name, sub:l.sub||'', cat:l.cat, type:l.type, grade:l.grade, pay:l.pay,\n          seller:l.seller, status:l.status, blurb:l.blurb,\n          price:(typeof l.cc==='number')?this.fmtMoney(l.cc,cur):(l.priceNote||'POA'),\n          isMast:isMast,\n          bleed:isMast?'#e8c87a':p.bleed, glow:p.glow,\n          border:isMast?'#e8c87a88':(risky?p.bleed+'66':'rgba(120,160,155,0.22)'),\n          bg:isMast?'linear-gradient(180deg,rgba(232,200,122,0.10),rgba(10,14,15,0.6))':'linear-gradient(180deg,'+p.bleed+'10,rgba(10,14,15,0.6))',\n          statusFg: risky?'#ff7a3c':(/IN STOCK|OPEN|VERIFIED|HIRING|ON CALL|LIVE BID/i.test(l.status||'')?'#6fae8a':'#9fc1ba'),\n          go:()=>this.openMarketItem(l.id) };\n      });\n      const sel=this.state.marketSel?(M.listings||[]).find(l=>l.id===this.state.marketSel):null;\n      vm.marketHasSel=!!sel; vm.closeMarketItem=()=>this.closeMarketItem();\n      if(sel){ const p=this.pal(sel.palette); const isMast=sel.cat==='MASTERPIECES';\n        vm.marketDetail={ id:sel.id, name:sel.name, sub:sel.sub||'', cat:sel.cat, type:sel.type, grade:sel.grade, pay:sel.pay,\n          seller:sel.seller, status:sel.status, blurb:sel.blurb, desc:this.corrupt(sel.desc),\n          price:(typeof sel.cc==='number')?this.fmtMoney(sel.cc,cur):(sel.priceNote||'POA'),\n          ccLine:(typeof sel.cc==='number')?('\\u25c8\\u2009'+sel.cc.toLocaleString()+' cursed credits'):(sel.priceNote||'price on application'),\n          curLabel:curObj.label,\n          i
