document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"329c04d9-70ac-4177-b782-f7a41f6f2bc7\"><\u002Fscript>\n<style>\n  html,body{margin:0;padding:0;background:#000;}\n  body{background:radial-gradient(140% 120% at 50% 45%,#0c0f10 0%,#050607 55%,#000 100%);}\n  *{box-sizing:border-box;}\n  ::-webkit-scrollbar{width:10px;height:10px;}\n  ::-webkit-scrollbar-track{background:#070b0c;}\n  ::-webkit-scrollbar-thumb{background:#1e2a28;border:1px solid #2c3c39;}\n  ::-webkit-scrollbar-thumb:hover{background:#314341;}\n  ::selection{background:rgba(180,215,210,0.25);color:#eafffd;}\n  @keyframes c47flick{0%,97%,100%{opacity:.05}98%{opacity:.16}99%{opacity:.02}}\n  @keyframes c47scan{0%{transform:translateY(0)}100%{transform:translateY(6px)}}\n  @keyframes c47blink{0%,49%{opacity:1}50%,100%{opacity:0}}\n  @keyframes c47grain{0%{transform:translate(0,0)}20%{transform:translate(-4%,3%)}40%{transform:translate(3%,-5%)}60%{transform:translate(-3%,4%)}80%{transform:translate(4%,2%)}100%{transform:translate(0,0)}}\n  @keyframes c47corrupt{0%{clip-path:inset(0 0 0 0);transform:translateX(0)}20%{clip-path:inset(20% 0 30% 0);transform:translateX(-1px)}40%{clip-path:inset(60% 0 10% 0);transform:translateX(1px)}60%{clip-path:inset(10% 0 60% 0);transform:translateX(-1px)}80%{clip-path:inset(40% 0 20% 0);transform:translateX(1px)}100%{clip-path:inset(0 0 0 0);transform:translateX(0)}}\n  @keyframes c47frag{0%{opacity:0}10%{opacity:1}100%{opacity:0}}\n  @keyframes c47drift{0%{transform:translate(0,0) scale(1);opacity:.5}50%{transform:translate(14px,-22px) scale(1.5);opacity:.18}100%{transform:translate(-8px,-44px) scale(.7);opacity:0}}\n  @keyframes c47sweep{0%{transform:translateY(-120%)}100%{transform:translateY(2200%)}}\n  @keyframes c47pulse{0%,100%{opacity:.55}50%{opacity:1}}\n  @keyframes c47caret{0%,49%{opacity:1}50%,100%{opacity:0}}\n  /* CRT refresh roll + power bloom */\n  @keyframes c47roll{0%{transform:translateY(-30%)}100%{transform:translateY(130%)}}\n  @keyframes c47bloom{0%,100%{opacity:.5}50%{opacity:.72}}\n  @keyframes c47ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}\n  /* hover glitch reveal (cannot be expressed inline) */\n  @keyframes c47hoverflick{0%,100%{clip-path:inset(0 0 0 0)}30%{clip-path:inset(38% 0 0 0)}55%{clip-path:inset(0 0 46% 0)}80%{clip-path:inset(12% 0 24% 0)}}\n  .c47hit{position:relative;}\n  .c47hit::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .12s;\n    background:linear-gradient(180deg,rgba(155,224,90,0.10),transparent 55%,rgba(155,224,90,0.07));\n    box-shadow:inset 0 0 0 1px rgba(155,224,90,0.55),inset 0 0 22px rgba(155,224,90,0.18);}\n  .c47hit:hover::after{opacity:1;animation:c47hoverflick .55s steps(3) infinite;}\n  .c47hov{position:absolute;top:8px;right:8px;z-index:6;pointer-events:none;opacity:0;transform:translateY(-4px);\n    transition:opacity .12s,transform .12s;font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;\n    color:#9be05a;background:rgba(132,210,79,0.13);border:1px solid rgba(132,210,79,0.5);padding:3px 8px;border-radius:1px;\n    text-shadow:1.4px 0 #ff3b6b,-1.4px 0 #2fe0ff;white-space:nowrap;}\n  .c47hit:hover .c47hov{opacity:1;transform:none;animation:c47corrupt 1.6s steps(4) infinite;}\n  /* ---- responsive / mobile ---- */\n  .c47burger{display:none;}\n  @media (max-width:880px), (max-height:560px){\n    .c47bezel{inset:0!important;border-radius:0!important;box-shadow:none!important;}\n    .c47bezel-edge{border-radius:0!important;}\n    .c47burger{display:flex!important;}\n    .c47side{position:absolute!important;z-index:70;top:46px;bottom:0;left:0;width:80%!important;max-width:300px;transform:translateX(-106%);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:10px 0 50px rgba(0,0,0,0.75);}\n    .c47side.c47open{transform:translateX(0);}\n    .c47scrim{display:none;position:absolute;inset:46px 0 0 0;z-index:65    if(window.C47DATA){ this.setState({data:window.C47DATA}); if(this._wait) this.finishBoot(); return true; }\n      return false;\n    };\n    if(!loadData()){\n      let tries=0;\n      const poll=setInterval(()=>{ tries++; if(loadData()||tries>120){ clearInterval(poll); if(tries>120&&!window.C47DATA) console.error('data load failed'); } }, 50);\n    }\n    this._iv = setInterval(()=>{\n      const t = this.state.bootShown + 1;\n      const pct = Math.min(100, Math.round(t / this._lines.length * 100));\n      this.setState({bootShown:t, bootPct:pct});\n      if(t >= this._lines.length){ clearInterval(this._iv); this._iv=null; setTimeout(()=>this.finishBoot(), 700); }\n    }, 360);\n    this._clk = setInterval(()=>{\n      const d=new Date(); const p=n=>String(n).padStart(2,'0');\n      this.setState({clock:p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds())});\n    }, 1000);\n    this._adv = setInterval(()=>{\n      if(this.state.phase!=='ready' || this.state.adClosed || this.state.route.section!=='home') return;\n      const n=(this.state.data&&this.state.data.HOME&&this.state.data.HOME.popupAds)||[];\n      if(n.length>1) this.setState(s=>({adIdx:(s.adIdx+1)%n.length}));\n    }, 9000);\n    this._key = (e)=>{ if(this.state.phase==='boot'){ this.skipBoot(); } else if(e.key==='Escape'){ this.escape(); } };\n    window.addEventListener('keydown', this._key);\n    this._hash = ()=>{ if(this._ignore){ this._ignore=false; return; } if(this.state.phase!=='ready') return; const r=this.parseHash(); this.glideTo(r); };\n    window.addEventListener('hashchange', this._hash);\n  }\n  componentWillUnmount(){ if(this._iv)clearInterval(this._iv); if(this._clk)clearInterval(this._clk); if(this._adv)clearInterval(this._adv); window.removeEventListener('keydown',this._key); window.removeEventListener('hashchange',this._hash); }\n  parseHash(){\n    const h=(location.hash||'').replace(/^#\\/?/,'');\n    const parts=h.split('/').filter(Boolean);\n    const sec=parts[0]||'home';\n    const valid=['home','registry','generation','techniques','arcs','social','world','lore','forum','clan'];\n    if(!valid.includes(sec)) return {section:'home',id:null};\n    return {section:sec, id:parts[1]||null};\n  }\n  skipBoot(){ if(this._iv){clearInterval(this._iv);this._iv=null;} this.setState({bootShown:this._lines.length, bootPct:100}); this.finishBoot(); }\n  finishBoot(){ if(this._done) return; if(!this.state.data){ this._wait=true; return; } this._done=true; const r=this.parseHash(); this.setState({phase:'ready', route:r}); }\n  setHash(sec,id){ this._ignore=true; location.hash = '#/'+sec+(id?'/'+id:''); }\n  glideTo(route){\n    const cur=this.state.route;\n    if(cur.section===route.section && cur.id===route.id) return;\n    this.setState({transitioning:true});\n    setTimeout(()=>{\n      this.setState({route:route, transitioning:false});\n      if(this.mainRef.current) this.mainRef.current.scrollTop=0;\n    }, 380);\n  }\n  nav(sec,id){ this.setHash(sec,id); this.glideTo({section:sec,id:id||null}); this.setState({navOpen:false}); }\n  escape(){ const r=this.state.route; if(r.id){ this.nav(r.section,null); } else if(r.section!=='home'){ this.nav('home',null); } }\n  toggleNav(){ this.setState(s=>({navOpen:!s.navOpen})); }\n  closeNav(){ this.setState({navOpen:false}); }\n  toggleTech(k){ const o=Object.assign({},this.state.openTech); o[k]=!o[k]; this.setState({openTech:o}); }\n  toggleThread(k){ const o=Object.assign({},this.state.openThread); o[k]=!o[k]; this.setState({openThread:o}); }\n  setForumTab(t){ this.setState({forumTab:t}); }\n  toggleForumDir(){ this.setState(s=>({forumDir:s.forumDir==='desc'?'asc':'desc'})); }\n  setForumBoard(b){ this.setState({forumBoard:b}); }\n  closeAd(){ this.setState({adClosed:true}); }\n  nextAd(){ const n=(this.state.data&&this.state.data.HOME&&this.state.data.HOME.popupAds)||[]; if(!n.length) return; this.setState(s=>({adIdx:(s.adIdx+1)%n.length, adClosed:false})); }\n  navClan(k){ this.nav('clan',k); } w.img||'',\n        bleed:p.bleed, ink:p.ink, border:inacc?'rgba(132,210,79,0.4)':'rgba(120,160,155,0.2)',\n        classFg: inacc?'#9be05a':(w.cls==='ACTIVE ALERT'?'#ff7a3c':(w.cls==='SANCTIONED'?'#6fae8a':'#cfe6e1')) };});\n    }\n    else if(sec==='lore'){\n      vm.isLore=true;\n      vm.loreCurrent=LORE.current;\n      vm.loreMechanics=LORE.mechanics;\n      vm.loreEras=LORE.eras.map(era=>{ const inacc=era.title.indexOf('INACCESSIBLE')>=0; const kp=this.pal('kenjaku'); return {\n        numeral:era.numeral, title: inacc?this.corrupt(era.title):era.title, span:era.span,\n        fg: inacc?kp.bleed:P.bleed, edge: inacc?kp.bleed+'88':'rgba(120,160,155,0.3)',\n        titleFg: inacc?kp.glow:'#dff3ee',\n        entries: era.entries.map(en=>({ head:en[0], body:this.corrupt(en[1]),\n          edge: en[2]?kp.bleed:'rgba(120,160,155,0.25)', headFg: en[2]?kp.glow:'#c4ddd7' })) };});\n    }\n    else if(sec==='forum' && d.FORUM){\n      const F=d.FORUM; const pm=this.forumPersona();\n      const netOf=t=>(t.up||0)-(t.down||0);\n      if(route.id && F.threads.find(x=>x.id===route.id)){\n        // ---- THREAD DETAIL ----\n        const t=F.threads.find(x=>x.id===route.id);\n        vm.isThread=true;\n        const net=netOf(t);\n        vm.thread={\n          id:t.id, board:t.board, kind:t.kind, title:t.title, author:t.author, time:t.time,\n          up:t.up, down:t.down, replies:t.replies, views:t.views, pinned:!!t.pinned,\n          net:(net>=0?'+':'')+net, netFg: net>=0?'#6fae8a':'#ff6a72',\n          pColor:pm.color[t.persona]||'#9fc1ba', pLabel:pm.label[t.persona]||'USER', showLabel:(pm.badge.indexOf(t.persona)>=0),\n          typeLabel:(F.postTypeLabel&&F.postTypeLabel[t.postType])||'THREAD',\n          isBlog: (t.postType==='blog'||t.postType==='article'),\n          opBlocks:(t.op||[]).map(p=>({text:p})),\n          hasOp:!!(t.op&&t.op.length),\n          hasArticle:!!(t.article&&t.article.length),\n          article:(t.article||[]).map(b=>({\n            isP:b.kind==='p', isH:b.kind==='h', isList:b.kind==='list', isQuote:b.kind==='quote', isEvidence:b.kind==='evidence',\n            text:b.text||'', by:b.by||'', evLabel:b.evLabel||'', items:(b.items||b.list||[]).map(s=>({text:s})) })),\n          comments:this.mapForumComments(t.comments),\n          back:()=>this.nav('forum',null),\n          related:F.threads.filter(x=>x.id!==t.id && x.board===t.board).slice(0,3).map(x=>{ const n=netOf(x);\n            return { id:x.id, title:x.title, kind:x.kind, net:(n>=0?'+':'')+n, replies:x.replies,\n              pColor:pm.color[x.persona]||'#9fc1ba', go:()=>this.nav('forum',x.id) }; })\n        };\n      } else {\n        // ---- THREAD LIST ----\n        vm.isForum=true;\n        const tab=this.state.forumTab; const board=this.state.forumBoard;\n        vm.forumIntro=F.intro;\n        vm.forumBoards=F.boards.map(b=>({ label:b, active:b===board, go:()=>this.setForumBoard(b),\n          edge:b===board?P.bleed:'rgba(120,160,155,0.25)', bg:b===board?P.bleed+'1e':'transparent', fg:b===board?'#eafffb':'#7a958f' }));\n        vm.forumTabs=[['trending','TRENDING'],['popular','POPULAR'],['recent','RECENT']].map(t=>({ key:t[0], label:t[1], active:t[0]===tab, go:()=>this.setForumTab(t[0]),\n          edge:t[0]===tab?P.bleed:'rgba(120,160,155,0.25)', bg:t[0]===tab?P.bleed+'1e':'transparent', fg:t[0]===tab?'#eafffb':'#7a958f' }));\n        const dir=this.state.forumDir||'desc'; const mul=dir==='asc'?-1:1;\n        vm.forumDirToggle=()=>this.toggleForumDir();\n        vm.forumDirArrow=dir==='asc'?'\\u25B2':'\\u25BC';\n        vm.forumDirLabel=dir==='asc'?'ASC':'DESC';\n        vm.forumDirTitle=tab==='popular'\n          ? (dir==='asc'?'fewest likes first':'most likes first')\n          : tab==='recent'\n            ? (dir==='asc'?'oldest first':'newest first')\n            : (dir==='asc'?'coldest first':'hottest first');\n        let list=F.threads.filter(t=>board==='ALL'||t.board===board);\n        const trend=t=>((t.up||0)-(t.down||0))/Math.max(1,(t.ts||1)/60+1);\n        let cmp;\n        if(tab==='recent') cmp=(a,b)=>(a.ts-b.ts);\n        else if(tab==='popular') cmp=(a,b)=>((b.up||0)-(a.up||0));\n        else cmp=(a,b)=>(trend(b)-trend(a));\n        list=list.slice().sort((a,b)=> mul*cmp(a,b) || ((b.up||0)-(a.up||0)) );\n        list.sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0));\n        vm.forumThreads=list.map(t=>{ const net=netOf(t);\n          return { id:t.id, board:t.board, kind:t.kind, title:t.title, author:t.author, time:t.time, up:t.up, down:t.down, replies:t.replies, views:t.views,\n            pinned:!!t.pinned, body:t.body, full:!!t.full,\n            netFg: net>=0?'#6fae8a':'#ff6a72', net:(net>=0?'+':'')+net,\n            pColor:pm.color[t.persona]||'#9fc1ba', pLabel:pm.label[t.persona]||'USER', showLabel:(pm.badge.indexOf(t.persona)>=0),\n            border: t.pinned?P.bleed+'66':'rgba(120,160,155,0.2)',\n            open:()=>this.nav('forum',t.id) };\n        });\n      }\n    }\n    else if(sec==='clan' && CLAN_DEFS){\n      const cd=CLAN_DEFS.find(c=>c.key===route.id);\n      if(cd){ vm.isClan=true; const p=this.pal(cd.palette);\n        const NOIMG='data:image/svg+xml,'+encodeURIComponent('<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"80\" height=\"80\"><rect width=\"80\" height=\"80\" fill=\"#0a1413\"/><g fill=\"#84d24f\" opacity=\"0.45\"><rect x=\"14\" y=\"32\" width=\"52\" height=\"3\"/><rect x=\"14\" y=\"40\" width=\"34\" height=\"3\"/><rect x=\"14\" y=\"48\" width=\"44\" height=\"3\"/><\u002Fg><\u002Fsvg>');\n        const fromChars=(cd.members||[]).map(m=>{ const c=CHARACTERS[m.char]; return c?{ name:c.name, grade:c.grade, img:c.img, role:c.role, isChar:true, key:c.key }:null; }).filter(Boolean);\n        const fromRoster=ROSTER.filter(r=>r.clanKey===cd.key).map(r=>({ name:r.name, grade:r.grade, img:r.img, role:r.role, isChar:!!(r.charKey&&CHARACTERS[r.charKey]), key:r.charKey }));\n        const members=fromChars.concat(fromRoster).map(m=>({ name:m.name, grade:m.grade, role:m.role||'', img:m.img||NOIMG,\n          tag:m.isChar?'\\u25B8 DECRYPT':'\\u25B8 LOGGED', cursor:m.isChar?'pointer':'default',\n          go:m.isChar?(()=>this.nav('registry',m.key)):(()=>{}) }));\n        vm.clan={ label:cd.label, spec:cd.spec, motto:cd.motto||'', influence:cd.influence||'', reach:cd.reach||0, reachW:(cd.reach||0)+'%',\n          desc:cd.desc, origins:cd.origins||'', rise:cd.rise||'', values:cd.values||'',\n          bleed:p.bleed, glow:p.glow, members, classified:cd.classified||[], note:cd.note };\n      } else { vm.isRegistry=true; vm.mains=[]; }\n    }\n    else if(!vm.isHome && !vm.isGeneration){ vm.isRegistry=true; vm.mains=[]; vm.rosterGroups=[]; }\n\n    return vm;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
